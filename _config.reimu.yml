# =========================================================
# Casper's Blog - Reimu Theme Config
# 檔案位置：_config.reimu.yml
# =========================================================


# =========================================================
# Menu / 導覽列
# 只保留：首頁、歸檔、關於
# =========================================================

menu:
  - name: home
    url: /
    icon:
  - name: archives
    url: /archives
    icon:
  - name: about
    url: /about
    icon:


# =========================================================
# Subtitle / 首頁副標題
# =========================================================

subtitle:
  typing:
    enable: false
    strings:
      - 我相信我的故事，有一天會被別人看見。
      - Cybersecurity / CTF / Web Development / Robotics
    typeSpeed: 100
    backSpeed: 50
    backDelay: 2000
    startDelay: 300
    loop: true
    shuffle: false
    showCursor: true
    cursorChar: "|"
    smartBackspace: false


# =========================================================
# Images / 圖片設定
# =========================================================

# 首頁大背景圖
# 圖片位置：source/images/banner.jpg
banner: "/images/banner.jpg"

banner_srcset:
  enable: false

# 網站小圖示
# 圖片位置：source/images/favicon.ico
favicon: "/images/05.jpg"

# 左側作者頭像
# 圖片位置：source/_data/avatar/avatar.png
avatar: "avatar.png"

# 預設文章封面
# 圖片位置：source/images/default-cover.jpg
cover: "/images/default-cover.jpg"


# =========================================================
# TOC / 文章目錄
# =========================================================

toc: true

toc_options:
  list_number: true
  min_depth: 2
  max_depth: 4


# =========================================================
# Open Graph
# =========================================================

open_graph:
  enable: true
  options:
    default_og_image: /images/banner.jpg


# =========================================================
# Excerpt / RSS
# =========================================================

excerpt_link: Read More
rss: atom.xml


# =========================================================
# Footer / 頁尾
# =========================================================

footer:
  since: 2025
  powered: true
  count: true
  busuanzi: false
  icon:
    url: "./images/taichi.png"
    rotate: false
    mask: true


# =========================================================
# Sidebar / 側邊欄
# =========================================================

sidebar:
  position: left
  menu: true
  article:
    show_common: true


# =========================================================
# Social / 社群連結
# =========================================================

social:
  email: mailto:casp3790er@gmail.com
  github: https://github.com/casper3790
  instagram:
  discord:


# =========================================================
# Widgets / 側邊欄小工具
# 不顯示分類、標籤雲、友鏈
# =========================================================

widgets:
  - archive
  - recent_posts

archive_type: "monthly"
show_count: true
recent_posts_limits: 5

only_show_capsule_in_index: false
uppercase_capsule: false
show_update_time: false


# =========================================================
# Summary / 摘要設定
# =========================================================

summary:
  enable: false
  style: 'subtitle'


# =========================================================
# i18n / 多語言
# 先關掉
# =========================================================

i18n:
  enable: false
  type: [page, post]
  generator: [archive, category, tag, index]
  languages: [zh-TW, en]


# =========================================================
# GitHub 右上角徽章
# =========================================================

triangle_badge:
  enable: false
  icon: github
  link: https://github.com/casper3790


# =========================================================
# Layout / 版面寬度
# =========================================================

layout:
  max_width: 1350px


# =========================================================
# Anchor Icon / 標題錨點
# =========================================================

anchor_icon:


# =========================================================
# Cursor / 關掉特殊游標
# =========================================================

reimu_cursor:
  enable: false
  cursor:
    default: ../images/cursor/reimu-cursor-default.png
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png


# =========================================================
# Icon Font
# =========================================================

icon_font: 4552607_ex15nbittbh


# =========================================================
# Font / 字體
# =========================================================

custom_font:
  enable: false
  article:
  code:

font:
  enable: true
  article:
    - Mulish
    - Noto Serif TC
    - Noto Sans TC
  code:
    - JetBrains Mono

local_font:
  article:
    - "-apple-system"
    - BlinkMacSystemFont
    - "Segoe UI"
    - "PingFang TC"
    - "Microsoft JhengHei"
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace


# =========================================================
# Dark Mode / 深色模式
# =========================================================

dark_mode:
  enable: auto


# =========================================================
# Math / 數學公式
# =========================================================

math:
  enable: false
  katex:
    enable: true
    autoRender: false
  mathjax:
    enable: false
    options:


# =========================================================
# Mermaid / 流程圖
# =========================================================

mermaid:
  enable: false


# =========================================================
# Comments / 留言系統
# 先全部關掉
# =========================================================

comment:
  title:
    en: Leave a comment
    zh-CN: 说些什么吧！
    zh-TW: 說些什麼吧！
    ja: コメントを残す
  default:

disqus:
  enable: false
  shortname:
  count: true

valine:
  enable: false

waline:
  enable: false

twikoo:
  enable: false

giscus:
  enable: false

artalk:
  enable: false


# =========================================================
# Search / 搜尋
# =========================================================

algolia_search:
  enable: false
  hits:
    per_page: 10

generator_search:
  enable: false
  field: post
  content: true


# =========================================================
# Preloader / 關掉載入畫面
# =========================================================

preloader:
  enable: false
  text:
    zh-CN: Loading...
    zh-TW: Loading...
    en: Loading...
    ja: Loading...
  icon:
  rotate: false


# =========================================================
# Animation / 動畫
# =========================================================

animation:
  enable: false
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up


# =========================================================
# Firework / 關掉點擊煙火
# =========================================================

firework:
  enable: false
  disable_on_mobile: true
  options:
    excludeElements: ["a", "button"]


# =========================================================
# Pjax / 關掉，避免快取和樣式問題
# =========================================================

pjax:
  enable: false


# =========================================================
# Quicklink
# =========================================================

quicklink:
  enable: false
  timeout: 3000
  priority: true
  ignores: []


# =========================================================
# Pace / 載入條
# =========================================================

pace:
  enable: false


# =========================================================
# Service Worker / 關掉，避免快取
# =========================================================

service_worker:
  enable: false


# =========================================================
# Live2D / 小人
# =========================================================

live2d:
  enable: false
  position: left

live2d_widgets:
  enable: false
  position: left


# =========================================================
# Music Player / 音樂播放器
# =========================================================

player:
  disable_on_mobile: true
  position: before_sidebar
  aplayer:
    enable: false
    options:
      audio: []
      fixed:
      autoplay:
      loop:
      order:
      preload:
      volume:
      mutex:
      listFolded:
      lrcType:
  meting:
    enable: false
    meting_api:
    options:
      id:
      server:
      type:
      auto:


# =========================================================
# pangu.js / 中英文自動空格
# =========================================================

pangu:
  enable: true


# =========================================================
# Lazyload / 圖片懶載入
# =========================================================

lazyload:
  enable: true


# =========================================================
# CDN
# =========================================================

cdn:
  enable: false


# =========================================================
# Injector
# 注意：整份 _config.reimu.yml 只能有一個 injector
# 功能：
# 1. 載入 custom.css
# 2. 強制移除友鏈 / friend
# 3. 如果舊 HTML 還有友鏈，JS 會直接刪掉
# =========================================================

injector:
  head_end: |
    <link rel="stylesheet" href="/casper.tw/css/custom.css">
    <style>
      a[href*="friend"],
      a[href*="friend/"],
      a[href*="/friend"],
      a[href*="/friend/"],
      li:has(a[href*="friend"]),
      .menu-item:has(a[href*="friend"]),
      .nav-item:has(a[href*="friend"]),
      .sidebar li:has(a[href*="friend"]),
      #sidebar li:has(a[href*="friend"]),
      #aside-content li:has(a[href*="friend"]) {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        width: 0 !important;
        height: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
        border: 0 !important;
      }
    </style>

  body_end: |
    <script>
      (function () {
        function removeFriendMenu() {
          const targets = document.querySelectorAll("a, li, .menu-item, .nav-item");

          targets.forEach(function (el) {
            const text = (el.textContent || "").trim();
            const href = el.getAttribute && el.getAttribute("href");

            const isFriend =
              text.includes("友鏈") ||
              text.includes("友链") ||
              text.toLowerCase().includes("friend") ||
              (href && href.toLowerCase().includes("friend"));

            if (isFriend) {
              const li = el.closest("li");
              const menuItem = el.closest(".menu-item");
              const navItem = el.closest(".nav-item");

              if (li) {
                li.remove();
              } else if (menuItem) {
                menuItem.remove();
              } else if (navItem) {
                navItem.remove();
              } else {
                el.remove();
              }
            }
          });
        }

        document.addEventListener("DOMContentLoaded", removeFriendMenu);
        window.addEventListener("load", removeFriendMenu);
        setTimeout(removeFriendMenu, 300);
        setTimeout(removeFriendMenu, 1000);
        setTimeout(removeFriendMenu, 2000);

        const observer = new MutationObserver(removeFriendMenu);
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true
        });
      })();
    </script>